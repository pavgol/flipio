name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          xcrun agvtool new-marketing-version "$VERSION"
          xcrun agvtool new-version -all "${{ github.run_number }}"

      - name: Archive (universal)
        run: |
          xcodebuild \
            -project Flipio.xcodeproj \
            -scheme Flipio \
            -configuration Release \
            -archivePath build/Flipio.xcarchive \
            archive \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM= \
            ENABLE_APP_SANDBOX=NO \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Flipio.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Ad-hoc codesign
        run: |
          codesign --force --deep --options=runtime \
            --entitlements App/Flipio.entitlements \
            --sign - build/export/Flipio.app
          codesign --verify --verbose=2 build/export/Flipio.app

      - name: Package DMG
        run: |
          mkdir -p build/dmg
          cp -R build/export/Flipio.app build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create \
            -volname "Flipio" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            "Flipio-${VERSION}.dmg"
          shasum -a 256 "Flipio-${VERSION}.dmg" | tee SHA256SUMS
          {
            echo "### Release artifact"
            echo
            echo '```'
            cat SHA256SUMS
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Flipio-*.dmg
            SHA256SUMS
          generate_release_notes: true
